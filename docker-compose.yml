services:
  nometoco:
    build: .
    container_name: nometoco
    restart: always
    ports:
      - "3002:3002"
    volumes:
      - nometoco-data:/app/data
    environment:
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:-cambia_esto_genera_uno_con_openssl_rand_hex_32}
      - NODE_ENV=production
      - TZ=Europe/Madrid

volumes:
  nometoco-data:
