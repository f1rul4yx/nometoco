<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Stop hand -->
  <g transform="translate(256,240) scale(1)">
    <!-- Palm -->
    <ellipse cx="0" cy="30" rx="75" ry="85" fill="url(#accent)" opacity="0.15"/>
    <ellipse cx="0" cy="30" rx="75" ry="85" fill="none" stroke="url(#accent)" stroke-width="5"/>
    <!-- Fingers -->
    <rect x="-55" y="-75" width="22" height="70" rx="11" fill="none" stroke="url(#accent)" stroke-width="5"/>
    <rect x="-20" y="-95" width="22" height="90" rx="11" fill="none" stroke="url(#accent)" stroke-width="5"/>
    <rect x="15" y="-90" width="22" height="85" rx="11" fill="none" stroke="url(#accent)" stroke-width="5"/>
    <rect x="48" y="-70" width="22" height="65" rx="11" fill="none" stroke="url(#accent)" stroke-width="5"/>
    <!-- Thumb -->
    <rect x="-85" y="-15" width="22" height="55" rx="11" fill="none" stroke="url(#accent)" stroke-width="5" transform="rotate(-30,-85,-15)"/>
    <!-- X mark -->
    <line x1="-35" y1="5" x2="35" y2="55" stroke="#f87171" stroke-width="10" stroke-linecap="round"/>
    <line x1="35" y1="5" x2="-35" y2="55" stroke="#f87171" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="256" y="405" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="52" fill="url(#accent)">NO ME TOCO</text>
</svg>
